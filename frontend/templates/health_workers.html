<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Health Workers - HeartGuard AI</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #e63946;
            --success: #06d6a0;
            --info: #4895ef;
            --bg-dark: #0a0e1a;
            --bg-surface: #111827;
            --text-primary: #ffffff;
            --text-secondary: rgba(255,255,255,0.65);
        }
        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-primary);
            min-height: 100vh;
        }
        .header {
            background: linear-gradient(135deg, #f39c12, #e67e22);
            padding: 20px;
            text-align: center;
        }
        .header h1 { font-size: 28px; margin-bottom: 5px; }
        .container { max-width: 900px; margin: 0 auto; padding: 30px 20px; }
        .back-btn {
            display: inline-block;
            padding: 10px 20px;
            background: var(--bg-surface);
            color: var(--text-primary);
            text-decoration: none;
            border-radius: 8px;
            margin-bottom: 20px;
        }
        .category-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        .tab {
            padding: 12px 24px;
            background: var(--bg-surface);
            border: none;
            border-radius: 8px;
            color: var(--text-primary);
            cursor: pointer;
            font-weight: 600;
        }
        .tab.active {
            background: #f39c12;
            color: white;
        }
        .workers-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
            gap: 20px;
        }
        .worker-card {
            background: var(--bg-surface);
            padding: 20px;
            border-radius: 12px;
        }
        .worker-card .avatar {
            width: 60px;
            height: 60px;
            background: #f39c12;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 30px;
            margin-bottom: 15px;
        }
        .worker-card h3 { margin-bottom: 5px; }
        .worker-card .role { color: #f39c22; font-weight: 600; margin-bottom: 10px; }
        .worker-card .experience { color: var(--text-secondary); font-size: 14px; margin-bottom: 10px; }
        .worker-card .rating { color: #f1c40f; margin-bottom: 15px; }
        .worker-card .price { font-size: 18px; font-weight: 700; color: var(--success); margin-bottom: 15px; }
        .btn-book {
            width: 100%;
            padding: 12px;
            background: #f39c12;
            color: white;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>👥 Health Worker Marketplace</h1>
        <p>Hire professional health workers</p>
    </div>
    
    <div class="container">
        <a href="/dashboard" class="back-btn">← Back to Dashboard</a>
        
        <div class="category-tabs">
            <button class="tab active" onclick="filterWorkers('all', this)">All</button>
            <button class="tab" onclick="filterWorkers('Caretaker', this)">Caretakers</button>
            <button class="tab" onclick="filterWorkers('Nurse', this)">Nurses</button>
            <button class="tab" onclick="filterWorkers('Dietician', this)">Dieticians</button>
            <button class="tab" onclick="filterWorkers('Trainer', this)">Fitness Trainers</button>
        </div>
        
        <div class="workers-grid" id="workersGrid"></div>
    </div>
    
    <script>
        const workers = [
            {name: 'Lakshmi', role: 'Caretaker', experience: '5 years', rating: '⭐⭐⭐⭐⭐', price: '₹500/day', category: 'Caretaker'},
            {name: 'Ramesh', role: 'Caretaker', experience: '3 years', rating: '⭐⭐⭐⭐', price: '₹400/day', category: 'Caretaker'},
            {name: 'Sunita', role: 'Nurse', experience: '8 years', rating: '⭐⭐⭐⭐⭐', price: '₹1200/day', category: 'Nurse'},
            {name: 'Priya', role: 'Nurse', experience: '6 years', rating: '⭐⭐⭐⭐', price: '₹1000/day', category: 'Nurse'},
            {name: 'Dr. Anjali', role: 'Dietician', experience: '10 years', rating: '⭐⭐⭐⭐⭐', price: '₹800/consult', category: 'Dietician'},
            {name: 'Kiran', role: 'Dietician', experience: '5 years', rating: '⭐⭐⭐⭐', price: '₹600/consult', category: 'Dietician'},
            {name: 'Vikram', role: 'Fitness Trainer', experience: '7 years', rating: '⭐⭐⭐⭐⭐', price: '₹700/session', category: 'Trainer'},
            {name: 'Meera', role: 'Fitness Trainer', experience: '4 years', rating: '⭐⭐⭐⭐', price: '₹500/session', category: 'Trainer'},
        ];
        
        function renderWorkers(filter = 'all') {
            const grid = document.getElementById('workersGrid');
            const filtered = filter === 'all' ? workers : workers.filter(w => w.category === filter);
            grid.innerHTML = filtered.map(w => `
                <div class="worker-card">
                    <div class="avatar">${w.name[0]}</div>
                    <h3>${w.name}</h3>
                    <p class="role">${w.role}</p>
                    <p class="experience">� experience: ${w.experience}</p>
                    <p class="rating">${w.rating}</p>
                    <p class="price">${w.price}</p>
                    <button class="btn-book" onclick="bookWorker('${w.name}', '${w.role}')">📞 Book Now</button>
                </div>
            `).join('');
        }
        
        function filterWorkers(category, btn) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            btn.classList.add('active');
            renderWorkers(category);
        }
        
        async function bookWorker(name, role) {
            try {
                const response = await fetch('/api/book-worker', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        workerName: name,
                        serviceType: role
                    })
                });
                
                const data = await response.json();
                
                if (data.success) {
                    alert(data.message + ' Booking ID: ' + data.booking_id);
                } else {
                    alert('Error: ' + data.error);
                }
            } catch (error) {
                alert('Error booking worker. Please try again.');
            }
        }
        
        renderWorkers();
    </script>
</body>
</html>
